name: CI-CD

on:
  push:
    branches:
      - main

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Backend syntax check
        working-directory: backend
        run: node --check src/server.js

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_API_URL: http://localhost:5000/api
        run: npm run build

      - name: Build backend Docker image
        run: docker build -t devcollab-backend:ci ./backend

      - name: Build frontend Docker image
        run: docker build --build-arg REACT_APP_API_URL=http://localhost:5000/api -t devcollab-frontend:ci ./frontend

      - name: Optional Docker Hub login
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Optional push backend image
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        run: |
          docker tag devcollab-backend:ci ${{ secrets.DOCKERHUB_USERNAME }}/devcollab-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devcollab-backend:latest

      - name: Optional push frontend image
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        run: |
          docker tag devcollab-frontend:ci ${{ secrets.DOCKERHUB_USERNAME }}/devcollab-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devcollab-frontend:latest
